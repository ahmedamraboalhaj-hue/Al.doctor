<!-- ① الـ Styles — أضفهم في <head> أو في style.css -->
<style>
/* ══ Banner التثبيت ══ */
#pwa-install-banner {
  display: none;
  position: fixed;
  bottom: 90px;          /* فوق زرار واتساب */
  left: 50%;
  transform: translateX(-50%);
  width: min(92%, 420px);
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4338ca 100%);
  border: 1px solid rgba(99,102,241,.5);
  border-radius: 20px;
  padding: 18px 20px;
  box-shadow: 0 8px 40px rgba(99,102,241,.35), 0 2px 12px rgba(0,0,0,.4);
  z-index: 9999;
  animation: pwa-slide-up .45s cubic-bezier(.34,1.56,.64,1) both;
  direction: rtl;
}

@keyframes pwa-slide-up {
  from { opacity: 0; transform: translateX(-50%) translateY(30px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0);    }
}

.pwa-banner-inner {
  display: flex;
  align-items: center;
  gap: 14px;
}

.pwa-banner-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(0,0,0,.35);
}

.pwa-banner-text { flex: 1; }

.pwa-banner-title {
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #e0e7ff;
  margin: 0 0 3px;
}

.pwa-banner-sub {
  font-family: 'Tajawal', sans-serif;
  font-size: 12.5px;
  color: #a5b4fc;
  margin: 0;
}

.pwa-banner-actions {
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: center;
}

#pwa-install-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 9px 20px;
  font-family: 'Tajawal', sans-serif;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(99,102,241,.5);
  transition: transform .15s, box-shadow .15s;
}

#pwa-install-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 6px 20px rgba(99,102,241,.65);
}

#pwa-dismiss-btn {
  background: transparent;
  border: none;
  color: #94a3b8;
  font-size: 11.5px;
  font-family: 'Tajawal', sans-serif;
  cursor: pointer;
  padding: 2px 4px;
  transition: color .2s;
}

#pwa-dismiss-btn:hover { color: #cbd5e1; }

/* ══ الزرار الدائم في الـ Header ══ */
#pwa-header-btn {
  display: none;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 7px 14px;
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(99,102,241,.4);
  transition: transform .15s;
  margin-left: 8px;   /* RTL: مسافة من الجنب */
}

#pwa-header-btn:hover { transform: scale(1.05); }

/* ══ Toast التحديث ══ */
#pwa-update-toast {
  display: none;
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #065f46;
  color: #d1fae5;
  border: 1px solid #34d399;
  border-radius: 14px;
  padding: 12px 22px;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 600;
  direction: rtl;
  z-index: 99999;
  box-shadow: 0 6px 24px rgba(0,0,0,.3);
  animation: pwa-slide-up .35s ease both;
  cursor: pointer;
  gap: 10px;
  align-items: center;
}
</style>

<!-- ② Banner HTML — أضفه قبل </body> مباشرةً -->
<div id="pwa-install-banner">
  <div class="pwa-banner-inner">
    <img src="ايقونة الهدر.png" alt="أيقونة التطبيق" class="pwa-banner-icon">
    <div class="pwa-banner-text">
      <p class="pwa-banner-title">📲 ثبّت التطبيق على تليفونك!</p>
      <p class="pwa-banner-sub">تشغيل بدون نت • تحديثات تلقائية • أسرع بكتير</p>
    </div>
    <div class="pwa-banner-actions">
      <button id="pwa-install-btn">⬇️ تثبيت</button>
      <button id="pwa-dismiss-btn">مش دلوقتي</button>
    </div>
  </div>
</div>

<!-- Toast إشعار التحديث -->
<div id="pwa-update-toast">
  🔄 يوجد تحديث جديد! اضغط هنا لتطبيقه.
</div>


<!-- ③ JavaScript — أضفه قبل </body> مباشرةً بعد الـ HTML فوق -->
<script>
(function () {
  'use strict';

  // ── متغيرات ──
  let deferredPrompt = null;
  const banner      = document.getElementById('pwa-install-banner');
  const installBtn  = document.getElementById('pwa-install-btn');
  const dismissBtn  = document.getElementById('pwa-dismiss-btn');
  const updateToast = document.getElementById('pwa-update-toast');

  // ── 1. تسجيل Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {

        // لو في تحديث جديد جاهز
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // في تحديث → وريه للمستخدم
              showUpdateToast(newWorker);
            }
          });
        });

      }).catch(err => console.warn('SW error:', err));

      // لو الصفحة اتحكمت بـ SW جديد → reload تلقائي
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    });
  }

  // ── 2. التقط حدث التثبيت ──
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // لو المستخدم مسّح الـ banner من قبل → متوريهوش
    if (localStorage.getItem('pwa-dismissed')) return;

    // وريه بعد 3 ثواني مش على طول
    setTimeout(() => { if (banner) banner.style.display = 'block'; }, 3000);
  });

  // ── 3. زرار التثبيت في الـ Banner ──
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        hideBanner();
      }
      deferredPrompt = null;
    });
  }

  // ── 4. زرار "مش دلوقتي" ──
  if (dismissBtn) {
    dismissBtn.addEventListener('click', () => {
      hideBanner();
      localStorage.setItem('pwa-dismissed', '1');
    });
  }

  // ── 5. بعد التثبيت → إخفاء الـ banner ──
  window.addEventListener('appinstalled', () => {
    hideBanner();
    deferredPrompt = null;
  });

  // ── 6. Toast التحديث ──
  function showUpdateToast(worker) {
    if (!updateToast) return;
    updateToast.style.display = 'flex';
    updateToast.addEventListener('click', () => {
      worker.postMessage({ type: 'SKIP_WAITING' });
      updateToast.style.display = 'none';
    });
    // يختفي تلقائياً بعد 10 ثواني
    setTimeout(() => { updateToast.style.display = 'none'; }, 10000);
  }

  function hideBanner() {
    if (banner) banner.style.display = 'none';
  }

})();
</script>
